name: Build & Release

# Pushing to main automatically builds installers for macOS / Linux / Windows
# (each on x64 + arm64) and publishes them to a GitHub Release for download.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (x64 + arm64)
            os: macos-latest
            args: --mac --x64 --arm64
          - name: Linux (x64 + arm64)
            os: ubuntu-latest
            args: --linux --x64 --arm64
          - name: Windows (x64 + arm64)
            os: windows-latest
            args: --win --x64 --arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm install (not ci) so each runner resolves its own platform-specific
        # optional deps (e.g. electron-builder-squirrel-windows on Windows).
        run: npm install --no-audit --no-fund

      - name: Build installers
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing + notarization (set these repo secrets to enable;
          # if absent, the mac build is produced unsigned).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # notarization via App Store Connect API key (preferred)
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # notarization via Apple ID + app-specific password (fallback)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -e
          ARGS="${{ matrix.args }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ -n "$CSC_LINK" ]; then
              NOTARIZE=false
              if [ -n "$APPLE_API_KEY_P8" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
                printf '%s' "$APPLE_API_KEY_P8" | openssl base64 -d -A > "$RUNNER_TEMP/AuthKey.p8"
                export APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
                NOTARIZE=true
                echo "macOS: signing + notarizing via App Store Connect API key"
              elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
                NOTARIZE=true
                echo "macOS: signing + notarizing via Apple ID"
              else
                echo "macOS: signing only (no notarization creds)"
              fi
              npx electron-builder $ARGS --publish never -c.mac.notarize=$NOTARIZE
              rm -f "$RUNNER_TEMP/AuthKey.p8" 2>/dev/null || true
            else
              echo "macOS: no signing secrets -> building UNSIGNED"
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              npx electron-builder $ARGS --publish never -c.mac.notarize=false
            fi
          else
            npx electron-builder $ARGS --publish never
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p out
          # only the downloadable installers (skip blockmaps / *.yml update metadata)
          find dist -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.exe' \) -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ runner.os }}
          path: out/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: ccbud v${{ steps.ver.outputs.version }}
          body: |
            **ccbud** v${{ steps.ver.outputs.version }} — a cross-platform desktop gateway that proxies Claude Code to any Anthropic-compatible provider, with one-click provider switching and model-name mapping.

            ### Downloads

            Pick the installer for your platform:

            - **macOS** — `.dmg` (x64 / arm64)
            - **Windows** — `.exe` (x64 / arm64)
            - **Linux** — `.AppImage` / `.deb` (x64 / arm64)
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
