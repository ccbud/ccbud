name: Build & Release

# Pushing to main builds Tauri installers for macOS (x64 + arm64) / Linux / Windows and
# publishes them to a GitHub Release, including the updater artifacts + latest.json that the
# in-app auto-updater reads. (Replaces the old Electron + JS-only hot-update pipeline.)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Rust unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev
      - name: cargo test
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

  release:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macOS x64
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: Linux x64
            platform: ubuntu-22.04
            args: ''
          - name: Windows x64
            platform: windows-latest
            args: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend deps
        run: npm install --no-audit --no-fund

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — REQUIRED for auto-update. Generate locally with
          # `npx tauri signer generate`; the public key lives in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (optional; unsigned if these secrets are absent).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: ccbud v__VERSION__
          releaseBody: |
            **ccbud** v__VERSION__ — a cross-platform desktop gateway that proxies Claude Code to any
            Anthropic-compatible provider, with one-click provider switching and model-name mapping.

            Pick the installer for your platform (macOS `.dmg` x64/arm64 · Windows `.exe`/`.msi` ·
            Linux `.AppImage`/`.deb`). Installed copies auto-update in place.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  homebrew:
    name: Publish Homebrew cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Detect tap token
        id: tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: echo "have=${TOKEN:+yes}" >> "$GITHUB_OUTPUT"

      - name: Download released dmgs
        if: steps.tap.outputs.have == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ steps.ver.outputs.version }}" -p '*.dmg' -D artifacts --repo "${{ github.repository }}"
          ls -la artifacts

      - name: Publish cask
        if: steps.tap.outputs.have == 'yes'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'ccbud/homebrew-tap' }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          # update-cask.js pins sha256 from the freshly-released dmgs in artifacts/.
          node scripts/update-cask.js artifacts homebrew/Casks/ccbud.rb
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Casks
          cp homebrew/Casks/ccbud.rb tap/Casks/ccbud.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ccbud.rb
          git commit -m "ccbud ${VERSION}" || { echo "no cask change"; exit 0; }
          git push
